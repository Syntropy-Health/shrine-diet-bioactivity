# Python MCP gateway CI — gates the user's success criteria for issue #34:
#   - functional usability: pure-logic + mocked-client unit tests
#   - integration usability: in-memory MCP-client SDK round-trip
#   - data integrity (Aura): node/edge invariants on the live indexed KG
#
# Connectivity to the deployed instance is NOT gated here — `deploy-mcp.yml`
# already polls /health post-deploy.
#
# This workflow is additive; the existing ci.yml continues to gate the TS MCP.

name: MCP CI

on:
  pull_request:
    branches: [main, test, "phase*/**"]
    paths:
      - 'mcp/**'
      - 'shrine-diet-bioactivity/lightrag/tests/**'
      - '.github/workflows/mcp-ci.yml'
      - 'scripts/test_coverage_ratio.py'
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  functional-integration:
    name: Functional + Integration (KG MCP gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
        with:
          # Submodules NOT needed: mcp/ tests have no submodule deps,
          # and the Aura test only needs the `neo4j` driver. Skipping
          # avoids a known broken `mcp-opennutrition` submodule pointer
          # that fails `submodules: recursive` checkout repo-wide.
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install with [test] extras
        run: pip install -e '.[test]'

      # Note: mcp/Makefile was removed in the chore/repo-cleanup-zombies pass
      # (commit 767bc07). pyproject.toml's pytest markers + addopts define the
      # canonical test selection; invoke pytest directly here.

      - name: Functional (unit tests — pure logic, mocked client)
        run: python -m pytest -m unit -v

      - name: Integration (in-memory MCP-client SDK round-trip)
        run: python -m pytest -m integration -v

      - name: Coverage report
        if: always()
        run: python -m pytest --cov=src/kg_mcp --cov-report=html --cov-report=term-missing || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcp-coverage
          path: mcp/htmlcov
          if-no-files-found: ignore
          retention-days: 14

  aura-data-integrity:
    name: Data Integrity (Aura instance)
    runs-on: ubuntu-latest
    # Skip on PRs from forks (no secrets available); run on same-repo PRs,
    # post-merge pushes to main/test, and manual dispatch. Without the
    # `push` clause, a regression that lands on main wouldn't trip the
    # Aura gate post-merge.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: shrine-diet-bioactivity/lightrag
    steps:
      - uses: actions/checkout@v4
        with:
          # Submodules NOT needed: mcp/ tests have no submodule deps,
          # and the Aura test only needs the `neo4j` driver. Skipping
          # avoids a known broken `mcp-opennutrition` submodule pointer
          # that fails `submodules: recursive` checkout repo-wide.
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Neo4j driver + pytest
        run: pip install neo4j pytest

      - name: Require Aura secrets on push/dispatch (issue #65)
        # Trusted runs (post-merge push, manual dispatch) MUST have the
        # NEO4J_* secrets — a misconfigured secret store should fail the
        # gate, not produce silent SUCCESS via pytest.skip. PRs from forks
        # have no secret access by design; the outer job-level `if:`
        # already routes those to the fork-safe path where this step is
        # skipped along with the rest of the job.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          if [ "$GH_EVENT_NAME" = "push" ] || [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            MISSING=()
            [ -z "$NEO4J_URI" ]      && MISSING+=("NEO4J_URI")
            [ -z "$NEO4J_USERNAME" ] && MISSING+=("NEO4J_USERNAME")
            [ -z "$NEO4J_PASSWORD" ] && MISSING+=("NEO4J_PASSWORD")
            if [ "${#MISSING[@]}" -gt 0 ]; then
              echo "::error::Aura gate invoked on $GH_EVENT_NAME but secrets missing: ${MISSING[*]} — refusing to run as a silent skip."
              exit 1
            fi
          fi

      - name: Run Aura data-integrity gates
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          # Sanitized env presence + length check — values themselves stay
          # opaque so secrets never echo to logs, but we can tell whether
          # they reached the runner at all.
          echo "NEO4J_URI: present=$([ -n \"$NEO4J_URI\" ] && echo yes || echo no), len=${#NEO4J_URI}"
          echo "NEO4J_USERNAME: present=$([ -n \"$NEO4J_USERNAME\" ] && echo yes || echo no), len=${#NEO4J_USERNAME}"
          echo "NEO4J_PASSWORD: present=$([ -n \"$NEO4J_PASSWORD\" ] && echo yes || echo no), len=${#NEO4J_PASSWORD}"
          # -rs surfaces the full skip reason in the pytest summary so we
          # can distinguish 'secret missing' from 'connection failed'. For
          # PR-from-fork events, secrets may legitimately be empty and the
          # pytest tier should skip cleanly — that's the fork-safe path.
          python -m pytest tests/test_aura_data_integrity.py -v -rs

  test-coverage-ratio:
    name: Real-integration ratio (regression floor)
    runs-on: ubuntu-latest
    # Gates the real-integration vs unit test ratio against a REGRESSION
    # FLOOR, not the plan's aspirational 50% target. The floor (0.10) sits
    # just below the current measured ratio (~0.12) — so the gate fails
    # only if coverage regresses, and is never unreachably red.
    #
    # Ratchet the --threshold upward as real-integration tests are added.
    # The plan's 50% headline additionally needs a denominator
    # reclassification (triaging pure schema/wiring unit tests out of the
    # ratio) — see research-journal/plans/2026-05-08-integration-test-
    # coverage-uplift-plan.md lines 44-47.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check real-integration ratio floor
        # scripts/test_coverage_ratio.py is stdlib-only (ast/csv/json) —
        # no install step needed. --mode fail exits 1 if ratio < threshold.
        run: python3 scripts/test_coverage_ratio.py --mode fail --threshold 0.10
