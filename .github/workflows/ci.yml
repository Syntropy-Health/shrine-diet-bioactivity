# Repo-level CI — typecheck + vitest + coverage gate
#
# Runs on every PR and on push to main/test.  Blocks merge on:
#   - TypeScript compile errors
#   - Vitest failures
#   - Coverage below thresholds declared in vitest.config.ts
#
# The main TS adapter is in the subdirectory `shrine-diet-bioactivity/`.
# Other dirs (mcp/, lightrag/) are Python packages or submodules and are not
# gated by this workflow.
#
# Data fixtures (Duke + FooDB + SymMap + HERB 2.0 + CMAUP + TTD) are
# downloaded and the unified SQLite DB is built on first run, then cached
# across runs via actions/cache. The cache key derives from the download and
# build scripts so a script change invalidates stale fixtures automatically.

name: CI

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Typecheck + Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shrine-diet-bioactivity
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: shrine-diet-bioactivity/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore data fixtures cache
        id: data-cache
        uses: actions/cache@v4
        with:
          path: |
            shrine-diet-bioactivity/data
            shrine-diet-bioactivity/data_local_temp
            shrine-diet-bioactivity/data_local
          # Bump the v<N> prefix to force a fresh download+build.
          key: data-fixtures-v1-${{ hashFiles('shrine-diet-bioactivity/scripts/download-sources.ts', 'shrine-diet-bioactivity/scripts/download-symmap.ts', 'shrine-diet-bioactivity/scripts/download-herb2.ts', 'shrine-diet-bioactivity/scripts/decompress-datasets.ts', 'shrine-diet-bioactivity/scripts/build-herbal-db.ts', 'shrine-diet-bioactivity/scripts/load-symmap.ts', 'shrine-diet-bioactivity/scripts/load-herb2.ts', 'shrine-diet-bioactivity/scripts/build-symptom-crosswalk.ts', 'shrine-diet-bioactivity/scripts/migrate-kg-expansion.ts', 'shrine-diet-bioactivity/scripts/migrate-multi-source.ts', 'shrine-diet-bioactivity/config/data_sources.yaml') }}
          restore-keys: |
            data-fixtures-v1-

      - name: Download data sources (Duke + FooDB)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/download-sources.ts

      - name: Download SymMap xlsx files
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/download-symmap.ts

      - name: Download HERB 2.0 via chedi API
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/download-herb2.ts

      - name: Decompress Duke + FooDB archives
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/decompress-datasets.ts

      - name: Build unified SQLite (Duke + FooDB)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/build-herbal-db.ts

      - name: KG expansion migration (symptoms, targets)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/migrate-kg-expansion.ts

      - name: Multi-source migration (CMAUP + CTD + TTD)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/migrate-multi-source.ts

      - name: Load SymMap (5 bilingual reference tables)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/load-symmap.ts

      - name: Load HERB 2.0 (herbs + herb_disease evidence)
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/load-herb2.ts

      - name: Build Duke<->SymMap symptom crosswalk
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: npx tsx scripts/build-symptom-crosswalk.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: shrine-diet-bioactivity/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '| Metric | Pct |' >> "$GITHUB_STEP_SUMMARY"
            echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              for (const k of ['statements','branches','functions','lines']) {
                console.log(\`| \${k} | \${s[k].pct}% |\`);
              }
            " >> "$GITHUB_STEP_SUMMARY"
          fi
